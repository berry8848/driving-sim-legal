# GitHub Pages (Jekyll) サイト設定
# 公開URL（プロジェクトページ）: https://berry8848.github.io/driving-sim-legal/
#
# ※ プロジェクトページ（berry8848.github.io/driving-sim-legal/）で公開するため、
#    baseurl にリポジトリ名を設定する必要がある。これを空のままにすると
#    {% link %} やナビのリンクが /terms/ のようにルート直下を指してしまい、
#    実際の /driving-sim-legal/terms/ に遷移せず 404 になる。
#    （ユーザーサイト berry8848.github.io で公開する場合のみ baseurl は空にする）
baseurl: /driving-sim-legal

title: 運転練習シミュレーター
description: 利用規約・プライバシーポリシー・特定商取引法に基づく表記
lang: ja

# GitHub Pages が公式サポートするデフォルトテーマ
theme: minima

# minima のヘッダーナビに出すページ
header_pages:
  - terms.md
  - privacy.md
  - tokushoho.md

# ビルド対象から除外（リポジトリ運用ファイル）
exclude:
  - README.md
